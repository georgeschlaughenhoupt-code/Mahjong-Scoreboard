<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mahjong Scorer">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.png">

  <title>2026 NMJL Scorekeeper</title>

  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1e1e1e;
      background: #f7f4ee;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding:
        env(safe-area-inset-top)
        14px
        env(safe-area-inset-bottom);
    }

    main {
      max-width: 720px;
      margin: auto;
    }

    h1 {
      font-size: 1.45rem;
      margin: 14px 0 4px;
    }

    .sub {
      color: #666;
      margin: 0 0 16px;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .score {
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 12px;
    }

    .score input {
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      border: 0;
      border-bottom: 1px solid #ddd;
      padding: 5px 0;
      background: transparent;
    }

    .amount {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 8px;
    }

    section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
    }

    label {
      display: block;
      margin: 11px 0;
      font-weight: 600;
    }

    select {
      width: 100%;
      font-size: 1rem;
      padding: 11px;
      margin-top: 5px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: white;
    }

    .radios,
    .check {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .radios label,
    .check label {
      margin: 0;
      font-weight: 500;
    }

    button {
      font-size: 1rem;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid #aaa;
      background: white;
    }

    button.primary {
      background: #222;
      color: white;
      border-color: #222;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .preview {
      background: #f3f3f3;
      border-radius: 12px;
      padding: 11px;
      margin-top: 12px;
    }

    .history {
      font-size: .94rem;
    }

    .entry {
      border-top: 1px solid #eee;
      padding: 10px 0;
    }

    small {
      color: #666;
    }
  </style>
</head>

<body>
<main>

  <h1>2026 NMJL Scorekeeper</h1>
  <p class="sub">Four-player American Mah Jongg scoring</p>

  <div class="scores" id="scores"></div>

  <section>

    <strong>Completed hand</strong>

    <label>
      Winner
      <select id="winner"></select>
    </label>

    <label>
      Value printed on 2026 NMJL card
      <select id="value">
        <option value="25">25¢</option>
        <option value="30">30¢</option>
        <option value="35">35¢</option>
        <option value="40">40¢</option>
        <option value="45">45¢</option>
        <option value="50">50¢</option>
        <option value="60">60¢</option>
        <option value="75">75¢</option>
      </select>
    </label>

    <div class="radios">
      <label>
        <input type="radio" name="type" value="discard" checked>
        Discard
      </label>

      <label>
        <input type="radio" name="type" value="self">
        Self-picked
      </label>
    </div>

    <label id="discarderLabel">
      Discarded by
      <select id="discarder"></select>
    </label>

    <div class="check">
      <label>
        <input id="jokerless" type="checkbox">
        Jokerless hand
      </label>
    </div>

    <div class="preview" id="preview"></div>

    <div class="buttons">
      <button class="primary" id="record">Record hand</button>
      <button id="wall">Wall game</button>
      <button id="undo">Undo</button>
    </div>

  </section>

  <section>

    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <strong>Game history</strong>
      <button id="reset">New game</button>
    </div>

    <div class="history" id="history">
      <small>No hands recorded yet.</small>
    </div>

  </section>

  <p>
    <small>
      Use your official 2026 NMJL card to identify the hand and select
      its printed value. This app does not reproduce the card's
      copyrighted hand patterns.
    </small>
  </p>

</main>

<script>

const KEY = 'nmjl2026scorekeeper-v1';

let state = {
  names: ['Player 1','Player 2','Player 3','Player 4'],
  scores: [0,0,0,0],
  history: []
};

try {
  const saved = JSON.parse(localStorage.getItem(KEY));
  if (saved) state = saved;
} catch(e) {}

const $ = id => document.getElementById(id);

const winner = $('winner');
const discarder = $('discarder');
const value = $('value');
const jokerless = $('jokerless');

function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
}

function type() {
  return document.querySelector('input[name=type]:checked').value;
}

function esc(s) {
  return String(s).replace(
    /[&<>"']/g,
    m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[m])
  );
}

function playerOptions() {

  winner.innerHTML = state.names
    .map((n,i) =>
      `<option value="${i}">${esc(n)}</option>`
    )
    .join('');

  updateDiscarders();
}

function updateDiscarders() {

  const w = +winner.value;

  discarder.innerHTML = state.names
    .map((n,i) =>
      i !== w
        ? `<option value="${i}">${esc(n)}</option>`
        : ''
    )
    .join('');
}

function payments() {

  const w = +winner.value;
  const base = +value.value;

  const multiplier = jokerless.checked ? 2 : 1;

  const payments = [0,0,0,0];

  if (type() === 'self') {

    for (let i=0; i<4; i++) {

      if (i !== w)
        payments[i] = base * 2 * multiplier;

    }

  } else {

    const d = +discarder.value;

    for (let i=0; i<4; i++) {

      if (i !== w)
        payments[i] =
          base * multiplier * (i === d ? 2 : 1);

    }
  }

  return payments;
}

function preview() {

  $('discarderLabel').style.display =
    type() === 'discard'
      ? 'block'
      : 'none';

  const w = +winner.value;

  const pay = payments();

  const total =
    pay.reduce((a,b) => a+b, 0);

  $('preview').innerHTML =

    `<strong>
       ${esc(state.names[w])}
       receives
       $${(total/100).toFixed(2)}
     </strong>

     <br>

     <small>

     ${
       pay
       .map((x,i) =>
          i !== w
            ? `${esc(state.names[i])}
               pays
               $${(x/100).toFixed(2)}`
            : ''
       )
       .filter(Boolean)
       .join(' • ')
     }

     </small>`;
}

function render() {

  $('scores').innerHTML =

    state.names
    .map((n,i) =>

      `<div class="score">

         <input
           data-name="${i}"
           value="${esc(n)}"
           aria-label="Player ${i+1} name">

         <div class="amount">

           ${state.scores[i] >= 0 ? '+' : ''}

           $${(state.scores[i]/100).toFixed(2)}

         </div>

       </div>`

    )
    .join('');

  document
  .querySelectorAll('[data-name]')
  .forEach(input =>

    input.addEventListener(
      'change',
      e => {

        const i =
          +e.target.dataset.name;

        state.names[i] =
          e.target.value.trim()
          ||
          `Player ${i+1}`;

        save();

        playerOptions();

        render();

      }
    )
  );

  if (state.history.length) {

    $('history').innerHTML =

      state.history
      .slice()
      .reverse()
      .map((h,r) =>

        `<div class="entry">

           <strong>
             Hand ${state.history.length-r}:
           </strong>

           ${esc(h.text)}

         </div>`

      )
      .join('');

  } else {

    $('history').innerHTML =
      '<small>No hands recorded yet.</small>';

  }

  preview();

  save();
}

function record() {

  const w = +winner.value;

  const pay = payments();

  const before =
    [...state.scores];

  let total = 0;

  pay.forEach((amount,i) => {

    if (i !== w) {

      state.scores[i] -= amount;

      total += amount;

    }

  });

  state.scores[w] += total;

  const description =

    type() === 'self'

    ? 'self-picked'

    : `won on ${state.names[+discarder.value]}'s discard`;

  state.history.push({

    before,

    text:

      `${state.names[w]} ${description}, ` +

      `${value.value}¢` +

      `${jokerless.checked ? ', jokerless' : ''}. ` +

      `Won $${(total/100).toFixed(2)}.`

  });

  render();
}

winner.addEventListener(
  'change',
  () => {
    updateDiscarders();
    preview();
  }
);

discarder.addEventListener(
  'change',
  preview
);

value.addEventListener(
  'change',
  preview
);

jokerless.addEventListener(
  'change',
  preview
);

document
.querySelectorAll('input[name=type]')
.forEach(
  x => x.addEventListener(
    'change',
    preview
  )
);

$('record')
.addEventListener(
  'click',
  record
);

$('wall')
.addEventListener(
  'click',
  () => {

    state.history.push({

      before:
        [...state.scores],

      text:
        'Wall game — no score change.'

    });

    render();

  }
);

$('undo')
.addEventListener(
  'click',
  () => {

    if (!state.history.length)
      return;

    state.scores =
      [...state.history.pop().before];

    render();

  }
);

$('reset')
.addEventListener(
  'click',
  () => {

    if (
      confirm(
        'Start a new game and clear scores/history?'
      )
    ) {

      state.scores =
        [0,0,0,0];

      state.history =
        [];

      render();

    }

  }
);

playerOptions();

render();

if ('serviceWorker' in navigator) {

  navigator.serviceWorker
    .register('./sw.js');

}

</script>
